services:
  - type: web
    name: celestial-eye-landing
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYPAL_MODE
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_SUBSCRIPTION_PLAN_ID
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
